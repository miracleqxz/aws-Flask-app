name: Build, Test and Deploy to ECS

on:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "database/**"
      - "services/**"
      - "templates/**"
      - "ai_agent/**"
      - "monitoring/**"
      - "nginx/**"
      - "requirements.txt"
      - "startup.sh"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "*.py"
      - "database/**"
      - "services/**"
      - "templates/**"
      - "monitoring/**"
      - "nginx/**"
      - "requirements.txt"
      - "startup.sh"
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/k8s-flask-app
  IMAGE_TAG: aws

jobs:
  security-check:
    name: Security Gate Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for security workflow completion
        run: |
          echo "Waiting for security workflow to complete..."
          sleep 30

      - name: Verify security checks passed
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'security.yml',
              head_sha: context.sha,
              per_page: 1
            });

            if (runs.workflow_runs.length === 0) {
              console.log('Security workflow not found for this commit');
              console.log('This is normal for the first run. Proceeding with deployment.');
              return;
            }

            const latestRun = runs.workflow_runs[0];

            if (latestRun.status === 'in_progress' || latestRun.status === 'queued') {
              console.log(`Security workflow still running: ${latestRun.status}`);
              console.log('Waiting a bit more...');
              await new Promise(resolve => setTimeout(resolve, 60000));
              
              const { data: updatedRun } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: latestRun.id
              });
              
              if (updatedRun.status !== 'completed') {
                console.log('Security workflow still not completed, but allowing deployment');
                return;
              }
              
              if (updatedRun.conclusion === 'failure') {
                core.setFailed(`Security workflow failed: ${updatedRun.conclusion}`);
                return;
              }
            }

            if (latestRun.conclusion === 'success') {
              console.log('Security checks passed');
            } else if (latestRun.conclusion === 'failure') {
              const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: latestRun.id
              });
              
              const criticalJobs = ['dependency-scanning', 'secrets-scanning'];
              const failedCriticalJobs = jobs.jobs.filter(job => 
                criticalJobs.includes(job.name) && job.conclusion === 'failure'
              );
              
              if (failedCriticalJobs.length > 0) {
                core.setFailed(`Critical security checks failed: ${failedCriticalJobs.map(j => j.name).join(', ')}`);
                return;
              }
              
              console.log('Security workflow failed but only non-critical checks failed');
              console.log('Terraform security warnings are non-blocking for dev environment');
              console.log('Proceeding with deployment');
            } else {
              console.log(`Security workflow status: ${latestRun.conclusion || latestRun.status}`);
              console.log('Proceeding with deployment');
            }

  build-and-deploy:
    name: Build and Deploy
    needs: security-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          if [ "$CHANGED" = "all" ]; then
            echo "flask=true" >> $GITHUB_OUTPUT
            echo "nginx=true" >> $GITHUB_OUTPUT
            echo "ai_agent=true" >> $GITHUB_OUTPUT
            echo "victoriametrics=true" >> $GITHUB_OUTPUT
            echo "grafana=true" >> $GITHUB_OUTPUT
          else
            echo "$CHANGED"
            # Flask app: root py files, database/, templates/, requirements.txt, Dockerfile, startup.sh
            if echo "$CHANGED" | grep -qE "^(app\.py|config\.py|metrics\.py|init_data\.py|analytics_worker\.py|upload_posters_to_s3\.py|database/|templates/|requirements\.txt|startup\.sh|Dockerfile|\.dockerignore)"; then
              echo "flask=true" >> $GITHUB_OUTPUT
            else
              echo "flask=false" >> $GITHUB_OUTPUT
            fi
            # Nginx
            if echo "$CHANGED" | grep -qE "^nginx/"; then
              echo "nginx=true" >> $GITHUB_OUTPUT
            else
              echo "nginx=false" >> $GITHUB_OUTPUT
            fi
            # AI Agent
            if echo "$CHANGED" | grep -qE "^ai_agent/"; then
              echo "ai_agent=true" >> $GITHUB_OUTPUT
            else
              echo "ai_agent=false" >> $GITHUB_OUTPUT
            fi
            # VictoriaMetrics
            if echo "$CHANGED" | grep -qE "^monitoring/victoriametrics/"; then
              echo "victoriametrics=true" >> $GITHUB_OUTPUT
            else
              echo "victoriametrics=false" >> $GITHUB_OUTPUT
            fi
            # Grafana
            if echo "$CHANGED" | grep -qE "^monitoring/grafana/"; then
              echo "grafana=true" >> $GITHUB_OUTPUT
            else
              echo "grafana=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build Docker image
        if: steps.changes.outputs.flask == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: app-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        if: steps.changes.outputs.flask == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "app-image:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Push Docker image
        if: steps.changes.outputs.flask == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AI Agent Docker image
        if: steps.changes.outputs.ai_agent == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./ai_agent
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ai-agent
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push VictoriaMetrics image
        if: steps.changes.outputs.victoriametrics == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring/victoriametrics
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:victoriametrics
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Grafana image
        if: steps.changes.outputs.grafana == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./monitoring/grafana
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:grafana
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Nginx image
        if: steps.changes.outputs.nginx == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force ECS deployment - Frontend
        if: steps.changes.outputs.nginx == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_FRONTEND }} \
            --force-new-deployment

      - name: Force ECS deployment - Backend
        if: steps.changes.outputs.flask == 'true' || steps.changes.outputs.ai_agent == 'true' || steps.changes.outputs.victoriametrics == 'true' || steps.changes.outputs.grafana == 'true'
        continue-on-error: true
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_BACKEND }} \
            --force-new-deployment

      - name: Wait for frontend service stability
        if: steps.changes.outputs.nginx == 'true'
        run: |
          echo "Waiting for frontend service to become stable..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_FRONTEND }} \
            --region ${{ secrets.AWS_REGION }}
          echo "Frontend deployment completed successfully!"

      - name: Wait for backend service stability
        if: steps.changes.outputs.flask == 'true' || steps.changes.outputs.ai_agent == 'true' || steps.changes.outputs.victoriametrics == 'true' || steps.changes.outputs.grafana == 'true'
        continue-on-error: true
        run: |
          echo "Waiting for backend service to become stable..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_BACKEND }} \
            --region ${{ secrets.AWS_REGION }} || true
          echo "Backend service stable"

      - name: Sync MeiliSearch via Lambda
        continue-on-error: true
        run: |
          echo "Triggering MeiliSearch sync..."
          sleep 30
          aws lambda invoke \
            --function-name service-checker-data-pipeline \
            --payload '{"action": "sync", "source": "github-actions"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/sync-response.json
          echo "Sync response:"
          cat /tmp/sync-response.json
          echo ""

      - name: Get deployment status
        if: success()
        run: |
          echo "=== Frontend Status ==="
          aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_FRONTEND }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'services[0].deployments[0]' \
            --output json
          echo ""
          echo "=== Backend Status ==="
          aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_BACKEND }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'services[0].deployments[0]' \
            --output json || true
