<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Assistant</title>
    <meta name="description" content="AI-powered movie discovery. Describe what you want to watch and get personalized recommendations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111113;
            --bg-tertiary: #1a1a1e;
            --bg-elevated: #222226;
            --bg-input: #1e1e22;
            --border: #2a2a2e;
            --border-light: #333338;
            --text-primary: #eaeaec;
            --text-secondary: #8e8e93;
            --text-muted: #5e5e63;
            --accent: #6366f1;
            --accent-hover: #5558e6;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --gold: #f0b429;
            --green: #10b981;
            --transition-layout: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ═══════════════════════════════════════════
           LEFT PANEL — Movie Content (hidden initially)
        ═══════════════════════════════════════════ */
        .panel-movie {
            width: 0;
            min-width: 0;
            overflow: hidden;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width var(--transition-layout), min-width var(--transition-layout);
            position: relative;
        }

        .app.split .panel-movie {
            width: 50%;
            min-width: 420px;
        }

        .panel-movie-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.85rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.3s ease 0.2s;
        }

        .app.split .panel-movie-header {
            opacity: 1;
        }

        .panel-movie-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .panel-close-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.7rem;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.78rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .panel-close-btn:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
            border-color: var(--border-light);
        }

        .panel-movie-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            opacity: 0;
            transition: opacity 0.3s ease 0.3s;
        }

        .app.split .panel-movie-content {
            opacity: 1;
        }

        .panel-movie-content::-webkit-scrollbar { width: 5px; }
        .panel-movie-content::-webkit-scrollbar-track { background: transparent; }
        .panel-movie-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        /* ═══════════════════════════════════════════
           RIGHT PANEL — Chat (always visible)
        ═══════════════════════════════════════════ */
        .panel-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-primary);
            transition: all var(--transition-layout);
        }

        /* ── Welcome State ── */
        .chat-welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .chat-welcome-screen.hidden { display: none; }

        .welcome-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.25);
        }

        .welcome-title {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 420px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .welcome-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            max-width: 500px;
        }

        .welcome-chip {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .welcome-chip:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }

        /* ── Chat Messages ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.5rem 0.5rem;
            display: none;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chat-messages.active {
            display: flex;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

        .msg {
            max-width: 75%;
            padding: 0.8rem 1.1rem;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.55;
            font-size: 0.9rem;
            animation: msgIn 0.25s ease-out;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg.assistant {
            align-self: flex-start;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border);
        }

        .msg.typing {
            color: var(--text-muted);
            font-style: italic;
        }

        .msg.typing .dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 2px;
        }

        .msg.typing .dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .msg.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
        .msg.typing .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ── Chat Input ── */
        .chat-input-wrap {
            padding: 0.75rem 1.25rem 1.25rem;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }

        .chat-input-inner {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            max-width: 680px;
            transition: max-width var(--transition-layout);
        }

        .app.split .chat-input-inner {
            max-width: 100%;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1.15rem;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .chat-input:focus {
            border-color: var(--accent);
            background: var(--bg-tertiary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .chat-send {
            padding: 0.75rem 1.3rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .chat-send:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .chat-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .chat-send svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* ═══════════════════════════════════════════
           MOVIE DETAIL CARD
        ═══════════════════════════════════════════ */
        .movie-detail-card {
            background: var(--bg-tertiary);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .movie-hero {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1.25rem;
            padding: 1.25rem;
        }

        .movie-poster {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .movie-info h2 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.65rem;
        }

        .movie-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.65rem;
        }

        .movie-meta .tag {
            padding: 0.2rem 0.6rem;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .movie-meta .tag.rating {
            background: var(--gold);
            color: #1a1a2e;
            font-weight: 700;
        }

        .movie-genres {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .movie-genres span {
            padding: 0.2rem 0.55rem;
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .movie-desc {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.85rem;
        }

        .movie-trailer {
            border-top: 1px solid var(--border);
            background: #000;
        }

        .movie-trailer .trailer-inner {
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 8px;
            font-size: 0.85rem;
        }

        .movie-trailer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-trailer .trailer-label {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }

        /* ═══════════════════════════════════════════
           AI RESULT CARDS (multiple movies)
        ═══════════════════════════════════════════ */
        .ai-results-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .ai-result-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
        }

        .ai-result-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .ai-result-poster {
            width: 90px;
            min-height: 135px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .ai-result-body {
            padding: 0.85rem 1rem;
            flex: 1;
            min-width: 0;
        }

        .ai-result-body h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }

        .ai-result-body .tag-row {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.35rem;
        }

        .ai-result-body .tag {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            padding: 0.15rem 0.5rem;
            border-radius: 5px;
            font-size: 0.72rem;
        }

        .ai-result-body .tag.gold {
            background: var(--gold);
            color: #1a1a2e;
            font-weight: 700;
        }

        .ai-result-body .genre-row {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }

        .ai-result-body .genre-pill {
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.68rem;
        }

        .ai-result-body .desc {
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.5;
            margin-top: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════
           TRAILER OVERLAY
        ═══════════════════════════════════════════ */
        .trailer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .trailer-overlay.visible { display: flex; }

        .trailer-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
        }

        .trailer-close:hover { background: rgba(255, 255, 255, 0.15); }

        .trailer-player {
            width: 100%;
            max-width: 720px;
            aspect-ratio: 16/9;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        .trailer-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .trailer-caption {
            text-align: center;
            margin-top: 1rem;
        }

        .trailer-caption h3 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
        }

        .trailer-caption p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        /* ═══════════════════════════════════════════
           LOADING SPINNER
        ═══════════════════════════════════════════ */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ═══════════════════════════════════════════
           NAV LINK
        ═══════════════════════════════════════════ */
        .nav-link {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.85rem;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
            border-color: var(--border-light);
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════ */
        @media (max-width: 900px) {
            .app.split { flex-direction: column; }

            .app.split .panel-movie {
                width: 100%;
                min-width: 0;
                max-height: 50vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .movie-hero {
                grid-template-columns: 140px 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .chat-input { font-size: 16px; }
        }

        @media (max-width: 500px) {
            .movie-hero {
                grid-template-columns: 1fr;
            }

            .movie-poster {
                max-width: 160px;
            }

            .welcome-title { font-size: 1.4rem; }
            .welcome-subtitle { font-size: 0.85rem; }

            .ai-result-card { flex-direction: column; }
            .ai-result-poster { width: 100%; height: 160px; min-height: auto; }
        }
    </style>
</head>

<body>

    <a href="/movies" class="nav-link" id="navLink">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
        Browse All Movies
    </a>

    <div class="app" id="app">

        <!-- LEFT PANEL — Movie Content -->
        <div class="panel-movie" id="panelMovie">
            <div class="panel-movie-header">
                <h2 id="panelTitle">Movie Details</h2>
                <button class="panel-close-btn" onclick="closePanel()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Close
                </button>
            </div>
            <div class="panel-movie-content" id="panelContent"></div>
        </div>

        <!-- RIGHT PANEL — Chat -->
        <div class="panel-chat" id="panelChat">

            <div class="chat-welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">🎬</div>
                <h1 class="welcome-title">What do you want to watch?</h1>
                <p class="welcome-subtitle">Describe a mood, genre, or ask about a specific movie — I'll find exactly what you need.</p>
                <div class="welcome-chips">
                    <button class="welcome-chip" onclick="quickSend('Recommend something like Inception')">🧠 Like Inception</button>
                    <button class="welcome-chip" onclick="quickSend('I want a feel-good comedy')">😄 Feel-good comedy</button>
                    <button class="welcome-chip" onclick="quickSend('Best thriller movies')">🔪 Best thrillers</button>
                    <button class="welcome-chip" onclick="quickSend('Something dark and psychological')">🌑 Dark & psychological</button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-wrap">
                <div class="chat-input-inner">
                    <input type="text" class="chat-input" id="chatInput"
                        placeholder="Describe what you want to watch…" autocomplete="off">
                    <button class="chat-send" id="chatSend" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Trailer Overlay -->
    <div class="trailer-overlay" id="trailerOverlay">
        <button class="trailer-close" id="trailerCloseBtn" title="Close">✕</button>
        <div class="trailer-player" id="trailerPlayer"></div>
        <div class="trailer-caption" id="trailerCaption"></div>
    </div>

    <script>
        const API_URL = '{{ ai_chat_api_url }}' || '';
        const API_KEY = '{{ ai_chat_api_key }}' || '';

        const $app = document.getElementById('app');
        const $welcomeScreen = document.getElementById('welcomeScreen');
        const $chatMessages = document.getElementById('chatMessages');
        const $chatInput = document.getElementById('chatInput');
        const $chatSend = document.getElementById('chatSend');
        const $panelMovie = document.getElementById('panelMovie');
        const $panelContent = document.getElementById('panelContent');
        const $panelTitle = document.getElementById('panelTitle');
        const $trailerOverlay = document.getElementById('trailerOverlay');
        const $trailerPlayer = document.getElementById('trailerPlayer');
        const $trailerCaption = document.getElementById('trailerCaption');

        let chatHistory = [];
        let isSplit = false;

        $chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function activateChat() {
            if ($welcomeScreen.classList.contains('hidden')) return;
            $welcomeScreen.classList.add('hidden');
            $chatMessages.classList.add('active');
        }

        function quickSend(text) {
            $chatInput.value = text;
            sendMessage();
        }

        // ── Layout Control ──

        function openSplit() {
            if (isSplit) return;
            isSplit = true;
            $app.classList.add('split');
        }

        function closePanel() {
            isSplit = false;
            $app.classList.remove('split');
            $panelContent.innerHTML = '';
        }

        // ── Messages ──

        function addMessage(text, role) {
            activateChat();
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            $chatMessages.appendChild(div);
            $chatMessages.scrollTop = $chatMessages.scrollHeight;
        }

        function showTyping() {
            activateChat();
            const div = document.createElement('div');
            div.className = 'msg assistant typing';
            div.id = 'typingIndicator';
            div.innerHTML = 'Thinking<span class="dots"><span></span><span></span><span></span></span>';
            $chatMessages.appendChild(div);
            $chatMessages.scrollTop = $chatMessages.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ── Send Message ──

        async function sendMessage() {
            const text = $chatInput.value.trim();
            if (!text) return;

            if (!API_URL) {
                addMessage('AI service is not available right now.', 'assistant');
                return;
            }

            $chatInput.value = '';
            $chatSend.disabled = true;
            addMessage(text, 'user');
            chatHistory.push({ role: 'user', content: text });
            showTyping();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(API_KEY && { 'X-Api-Key': API_KEY })
                    },
                    body: JSON.stringify({
                        message: text,
                        history: chatHistory.slice(-10)
                    })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                removeTyping();

                if (data.error === 'Rate limit exceeded') {
                    addMessage(`Rate limit exceeded. ${data.message || 'Please try again later.'}`, 'assistant');
                    return;
                }

                if (data.message) {
                    addMessage(data.message, 'assistant');
                    chatHistory.push({ role: 'assistant', content: data.message });
                }

                if (data.youtube_trailer && data.youtube_trailer.video_id) {
                    openTrailer(data.youtube_trailer);
                } else if (data.movie_detail) {
                    showMovieDetail(data.movie_detail);
                } else if (data.movie_results && data.movie_results.length > 0) {
                    showMovieResults(data.movie_results);
                }

            } catch (e) {
                removeTyping();
                console.error('Chat error:', e);
                addMessage('Sorry, something went wrong. Please try again.', 'assistant');
            } finally {
                $chatSend.disabled = false;
                $chatInput.focus();
            }
        }

        // ── Movie Detail ──

        function showMovieDetail(movie) {
            openSplit();
            $panelTitle.textContent = movie.title || 'Movie Details';

            const genres = Array.isArray(movie.genres) ? movie.genres : [];
            const posterSrc = movie.poster_filename ? `/api/poster/${movie.poster_filename}` : '';

            $panelContent.innerHTML = `
                <div class="movie-detail-card">
                    <div class="movie-hero">
                        ${posterSrc ? `<img src="${posterSrc}" alt="${movie.title}" class="movie-poster">` : '<div></div>'}
                        <div class="movie-info">
                            <h2>${movie.title}</h2>
                            <div class="movie-meta">
                                <span class="tag rating">${movie.rating}/10</span>
                                <span class="tag">${movie.year}</span>
                                ${movie.director ? `<span class="tag">${movie.director}</span>` : ''}
                            </div>
                            ${genres.length > 0 ? `<div class="movie-genres">${genres.map(g => `<span>${g}</span>`).join('')}</div>` : ''}
                            <p class="movie-desc">${movie.description || ''}</p>
                        </div>
                    </div>
                    <div class="movie-trailer" id="movieTrailer-${movie.id}">
                        <div class="trailer-inner">
                            <div class="spinner"></div>
                            Loading trailer…
                        </div>
                    </div>
                </div>`;

            loadTrailerForDetail(movie.id, movie.title, movie.year);
        }

        async function loadTrailerForDetail(movieId, title, year) {
            const container = document.getElementById(`movieTrailer-${movieId}`);
            if (!container) return;
            try {
                const res = await fetch(`/api/youtube/trailer/${movieId}`);
                if (!res.ok) throw new Error('No trailer');
                const data = await res.json();
                if (!data.video_id) throw new Error('No video');

                container.innerHTML = `
                    <div style="aspect-ratio:16/9;">
                        <iframe src="https://www.youtube.com/embed/${data.video_id}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen></iframe>
                    </div>
                    <div class="trailer-label">
                        <strong>${data.title || title + ' — Trailer'}</strong>
                        <span style="color:var(--text-muted);margin-left:6px;">${year || ''}</span>
                    </div>`;
            } catch {
                container.innerHTML = `
                    <div class="trailer-inner">
                        <span style="font-size:1.3em;">🎬</span>
                        Trailer not available
                    </div>`;
            }
        }

        // ── Movie Results (multiple) ──

        function showMovieResults(movies) {
            if (!movies || movies.length === 0) return;
            openSplit();
            $panelTitle.textContent = 'Recommendations';

            $panelContent.innerHTML = `<div class="ai-results-list">
                ${movies.map(m => {
                    const genres = Array.isArray(m.genres) ? m.genres : [];
                    const posterSrc = m.poster_filename ? `/api/poster/${m.poster_filename}` : '';
                    return `
                    <div class="ai-result-card" onclick="openDetailById(${m.id})">
                        ${posterSrc ? `<img class="ai-result-poster" src="${posterSrc}" alt="${m.title}" loading="lazy">` : ''}
                        <div class="ai-result-body">
                            <h4>${m.title}</h4>
                            <div class="tag-row">
                                <span class="tag gold">${m.rating}</span>
                                <span class="tag">${m.year}</span>
                                ${m.director ? `<span class="tag">${m.director}</span>` : ''}
                            </div>
                            ${genres.length > 0 ? `<div class="genre-row">${genres.map(g => `<span class="genre-pill">${g}</span>`).join('')}</div>` : ''}
                            ${m.description ? `<p class="desc">${m.description}</p>` : ''}
                        </div>
                    </div>`;
                }).join('')}
            </div>`;
        }

        async function openDetailById(movieId) {
            $panelContent.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading…</div>';
            $panelTitle.textContent = 'Movie Details';
            try {
                const res = await fetch(`/api/movie/${movieId}`);
                const data = await res.json();
                if (data.movie) {
                    showMovieDetail(data.movie);
                }
            } catch (e) {
                $panelContent.innerHTML = '<div class="loading-state">Failed to load movie details</div>';
            }
        }

        // ── Trailer Overlay ──

        function openTrailer(trailer) {
            if (!trailer || !trailer.video_id) return;
            $trailerPlayer.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${trailer.video_id}?autoplay=1&rel=0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>`;
            $trailerCaption.innerHTML = `
                <h3>${trailer.movie_title || 'Trailer'}</h3>
                ${trailer.year ? `<p>${trailer.year}</p>` : ''}`;
            $trailerOverlay.classList.add('visible');
        }

        function closeTrailer() {
            $trailerOverlay.classList.remove('visible');
            $trailerPlayer.innerHTML = '';
        }

        $trailerOverlay.addEventListener('click', e => {
            if (e.target === $trailerOverlay) closeTrailer();
        });
        document.getElementById('trailerCloseBtn').addEventListener('click', closeTrailer);
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeTrailer();
        });

        // ── Init ──
        $chatInput.focus();
    </script>

</body>

</html>
