<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidy — Your Personal Movie Guide</title>
    <meta name="description" content="Guidy — your personal guide to endless movie lists.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a1118;
            --surface: rgba(10, 20, 30, 0.88);
            --surface-solid: #0c1620;
            --card: rgba(12, 22, 35, 0.9);
            --card-hover: rgba(18, 32, 50, 0.95);
            --border: rgba(130, 180, 220, 0.08);
            --border-light: rgba(130, 180, 220, 0.14);
            --text: #dce8f0;
            --text-secondary: #8aa8c0;
            --text-muted: #4a6a82;
            --accent: #4a90d9;
            --accent-hover: #3d7ec4;
            --accent-glow: rgba(74, 144, 217, 0.18);
            --gold: #e8b84a;
            --search-bg: rgba(8, 16, 24, 0.85);
            --chat-max-width: 720px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════════
           HERO BACKGROUND
        ═══════════════════════════════════════════ */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 70vh;
            background: url('/static/background.webp') center top / cover no-repeat;
            z-index: 0;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(10, 17, 24, 0.1) 0%,
                    rgba(10, 17, 24, 0.35) 50%,
                    rgba(10, 17, 24, 0.8) 75%,
                    var(--bg) 100%);
        }

        /* ═══════════════════════════════════════════
           BRANDING (top-left)
        ═══════════════════════════════════════════ */
        .brand {
            position: fixed;
            top: 1.2rem;
            left: 1.5rem;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-name {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.7);
        }

        .brand-sub {
            font-size: 0.9rem;
            color: rgba(200, 220, 240, 0.65);
            font-weight: 400;
            margin-left: 0.3rem;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
        }

        /* ═══════════════════════════════════════════
           MAIN CONTENT
        ═══════════════════════════════════════════ */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .hero-spacer {
            height: 55vh;
        }

        .content-area {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .section-header {
            display: none;
        }

        /* ═══════════════════════════════════════════
           MOVIE GRID
        ═══════════════════════════════════════════ */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1.2rem;
        }

        .movie-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            backdrop-filter: blur(8px);
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            border-color: var(--border-light);
            background: var(--card-hover);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .movie-card .card-body {
            padding: 0.85rem;
        }

        .movie-card .card-title {
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-card .card-rating {
            display: inline-block;
            background: var(--gold);
            color: #1a1a2e;
            padding: 0.12rem 0.45rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.72rem;
        }

        .movie-card .card-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* ═══════════════════════════════════════════
           PAGINATION
        ═══════════════════════════════════════════ */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .pagination button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            padding: 0 10px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            background: var(--surface);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(6px);
        }

        .pagination button:hover:not(:disabled):not(.active) {
            background: var(--card-hover);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .pagination button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination .ellipsis {
            color: var(--text-muted);
            min-width: 30px;
            text-align: center;
            font-size: 0.85rem;
        }

        .page-info {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.75rem;
        }

        /* ═══════════════════════════════════════════
           FIXED SEARCH BAR
        ═══════════════════════════════════════════ */
        .search-dock {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 70;
            padding: 1rem 1.5rem 1.25rem;
            background: linear-gradient(to top, var(--bg) 65%, transparent);
            pointer-events: none;
        }

        .search-dock-inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            gap: 0.6rem;
            pointer-events: all;
        }

        .search-input {
            flex: 1;
            padding: 1.1rem 1.5rem;
            border: 2px solid rgba(130, 180, 220, 0.18);
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            background: rgba(8, 16, 24, 0.92);
            color: var(--text);
            backdrop-filter: blur(24px);
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 6px 30px rgba(0, 0, 0, 0.4);
        }

        .search-send {
            padding: 1.1rem 1.6rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(74, 144, 217, 0.25);
        }

        .search-send:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 4px 20px rgba(74, 144, 217, 0.35);
        }

        .search-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .search-send svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
        }

        /* ═══════════════════════════════════════════
           SPLIT VIEW (when AI returns multiple results)
        ═══════════════════════════════════════════ */
        .split-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 80;
            background: var(--bg);
        }

        .split-overlay.visible {
            display: flex;
        }

        .split-left {
            width: 65%;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .split-left-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface-solid);
            flex-shrink: 0;
        }

        .split-left-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .split-close {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.65rem;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .split-close:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }

        .split-left-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
        }

        .split-left-content::-webkit-scrollbar {
            width: 5px;
        }

        .split-left-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .split-left-content::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        .split-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface-solid);
        }

        .split-chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .split-chat::-webkit-scrollbar {
            width: 5px;
        }

        .split-chat::-webkit-scrollbar-track {
            background: transparent;
        }

        .split-chat::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        .split-input-wrap {
            padding: 0.75rem 1rem 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .split-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border-light);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            transition: border-color 0.2s;
        }

        .split-input:focus {
            border-color: var(--accent);
        }

        .split-input::placeholder {
            color: var(--text-muted);
        }

        .split-send {
            padding: 0.75rem 1.1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }

        .split-send:hover {
            background: var(--accent-hover);
        }

        /* ═══════════════════════════════════════════
           CHAT MESSAGES
        ═══════════════════════════════════════════ */
        .msg {
            max-width: 85%;
            padding: 0.8rem 1.1rem;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.55;
            font-size: 0.92rem;
            animation: msgIn 0.2s ease-out;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .msg.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
        }

        .msg.typing {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
        }

        .msg.typing .dots {
            display: inline-flex;
            gap: 3px;
            margin-left: 4px;
            vertical-align: middle;
        }

        .msg.typing .dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .msg.typing .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .msg.typing .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {

            0%,
            80%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ═══════════════════════════════════════════
           AI RESULTS GRID (inside split)
        ═══════════════════════════════════════════ */
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1rem;
        }

        /* ═══════════════════════════════════════════
           MOVIE DETAIL CARD (inside split)
        ═══════════════════════════════════════════ */
        .detail-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .detail-hero {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 1.25rem;
            padding: 1.25rem;
        }

        .detail-poster {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .detail-info h2 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.65rem;
        }

        .detail-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.65rem;
        }

        .detail-meta .tag {
            padding: 0.2rem 0.6rem;
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-secondary);
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .detail-meta .tag.rating {
            background: var(--gold);
            color: #1a1a2e;
            font-weight: 700;
        }

        .detail-genres {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .detail-genres span {
            padding: 0.2rem 0.55rem;
            background: rgba(74, 144, 217, 0.14);
            color: #8ab8e0;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .detail-desc {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.88rem;
        }

        .detail-trailer {
            border-top: 1px solid var(--border);
            background: #000;
        }

        .detail-trailer .trailer-placeholder {
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 8px;
            font-size: 0.85rem;
        }

        .detail-trailer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .detail-trailer .trailer-label {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }

        .similar-section {
            border-top: 1px solid var(--border);
            padding: 1rem 1.25rem;
        }

        .similar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.75rem;
        }

        .similar-row {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .similar-row::-webkit-scrollbar {
            height: 4px;
        }

        .similar-row::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 2px;
        }

        .similar-row .movie-card {
            flex: 0 0 140px;
            min-width: 140px;
        }

        .similar-row .movie-card img {
            height: 200px;
        }

        /* ═══════════════════════════════════════════
           LOADING
        ═══════════════════════════════════════════ */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════ */
        @media (max-width: 900px) {
            .hero-spacer {
                height: 40vh;
            }

            .hero-bg {
                height: 50vh;
            }

            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }

            .movie-card img {
                height: 225px;
            }

            .split-overlay.visible {
                flex-direction: column;
            }

            .movies-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .split-left {
                width: 100%;
                max-height: 55vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .detail-hero {
                grid-template-columns: 140px 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .search-input {
                font-size: 16px;
            }
        }

        @media (max-width: 500px) {
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .movie-card img {
                height: 180px;
            }

            .detail-hero {
                grid-template-columns: 1fr;
            }

            .detail-poster {
                max-width: 160px;
            }

            .brand-name {
                font-size: 2rem;
            }

            .brand-sub {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="hero-bg"></div>

    <div class="brand">
        <span class="brand-name">Guidy</span>
        <span class="brand-sub">your personal movie guide</span>
    </div>

    <div class="page" id="page">
        <div class="hero-spacer"></div>

        <div class="content-area">
            <div class="section-header">
                <h1 class="section-title">All Movies</h1>
                <span class="movie-count" id="movieCount"></span>
            </div>
            <div class="movies-grid" id="moviesGrid"></div>
            <nav class="pagination" id="pagination"></nav>
            <div class="page-info" id="pageInfo"></div>
        </div>
    </div>

    <div class="search-dock">
        <div class="search-dock-inner">
            <input type="text" class="search-input" id="searchInput"
                placeholder="Search a movie or describe what you want to watch…" autocomplete="off">
            <button class="search-send" id="searchSend" onclick="sendQuery()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
                Send
            </button>
        </div>
    </div>

    <div class="split-overlay" id="splitOverlay">
        <div class="split-left">
            <div class="split-left-header">
                <h2 id="splitTitle">Results</h2>
                <button class="split-close" onclick="closeSplit()">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    Close
                </button>
            </div>
            <div class="split-left-content" id="splitContent"></div>
        </div>
        <div class="split-right">
            <div class="split-chat" id="splitChat"></div>
            <div class="split-input-wrap">
                <input type="text" class="split-input" id="splitInput" placeholder="Continue chatting…"
                    autocomplete="off">
                <button class="split-send" onclick="sendSplitMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '{{ ai_chat_api_url }}' || '';
        const API_KEY = '{{ ai_chat_api_key }}' || '';
        const $grid = document.getElementById('moviesGrid');
        const $pagination = document.getElementById('pagination');
        const $pageInfo = document.getElementById('pageInfo');
        const $searchInput = document.getElementById('searchInput');
        const $splitOverlay = document.getElementById('splitOverlay');
        const $splitContent = document.getElementById('splitContent');
        const $splitTitle = document.getElementById('splitTitle');
        const $splitChat = document.getElementById('splitChat');
        const $splitInput = document.getElementById('splitInput');

        let currentPage = 1;
        let chatHistory = [];

        $searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
        });
        $splitInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendSplitMessage(); }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeSplit();
        });

        /* ── Movie Grid ── */
        async function loadMovies(page) {
            $grid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading movies…</div>';
            try {
                const res = await fetch(`/api/movies?page=${page}&per_page=24`);
                const data = await res.json();
                renderGrid(data.movies);
                renderPagination(data.page, data.pages, data.total);
                currentPage = data.page;
                window.scrollTo({ top: document.querySelector('.content-area').offsetTop - 20, behavior: 'smooth' });
            } catch (e) {
                $grid.innerHTML = '<div class="loading-state">Failed to load movies</div>';
            }
        }

        function renderGrid(movies) {
            $grid.innerHTML = movies.map(m => {
                const poster = m.poster_filename ? `/api/poster/${m.poster_filename}` : '';
                const genres = Array.isArray(m.genres) ? m.genres.join(', ') : (m.genres || '');
                return `
                <a href="/movie/${m.id}" class="movie-card">
                    ${poster ? `<img src="${poster}" alt="${m.title}" loading="lazy">` : '<div style="height:300px;background:var(--card);"></div>'}
                    <div class="card-body">
                        <div class="card-title">${m.title}</div>
                        <span class="card-rating">${m.rating}/10</span>
                        <div class="card-meta">${m.year}${genres ? ' · ' + genres : ''}</div>
                    </div>
                </a>`;
            }).join('');
        }

        function renderPagination(page, pages, total) {
            if (pages <= 1) { $pagination.innerHTML = ''; $pageInfo.innerHTML = ''; return; }

            let html = '';
            html += `<button ${page <= 1 ? 'disabled' : ''} onclick="loadMovies(1)">«</button>`;
            html += `<button ${page <= 1 ? 'disabled' : ''} onclick="loadMovies(${page - 1})">‹</button>`;

            const start = Math.max(1, page - 2);
            const end = Math.min(pages, page + 2);

            if (start > 1) {
                html += `<button onclick="loadMovies(1)">1</button>`;
                if (start > 2) html += `<span class="ellipsis">…</span>`;
            }

            for (let p = start; p <= end; p++) {
                html += `<button class="${p === page ? 'active' : ''}" onclick="loadMovies(${p})">${p}</button>`;
            }

            if (end < pages) {
                if (end < pages - 1) html += `<span class="ellipsis">…</span>`;
                html += `<button onclick="loadMovies(${pages})">${pages}</button>`;
            }

            html += `<button ${page >= pages ? 'disabled' : ''} onclick="loadMovies(${page + 1})">›</button>`;
            html += `<button ${page >= pages ? 'disabled' : ''} onclick="loadMovies(${pages})">»</button>`;
            $pagination.innerHTML = html;

            const from = (page - 1) * 24 + 1;
            const to = Math.min(page * 24, total);
            $pageInfo.textContent = `Showing ${from}–${to} of ${total} movies`;
        }

        /* ── Search / AI Chat ── */
        async function sendQuery() {
            const text = $searchInput.value.trim();
            if (!text) return;
            if (!API_URL) return;

            $searchInput.value = '';
            document.getElementById('searchSend').disabled = true;
            chatHistory = [{ role: 'user', content: text }];

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(API_KEY && { 'X-Api-Key': API_KEY })
                    },
                    body: JSON.stringify({ message: text, history: [] })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                if (data.message) chatHistory.push({ role: 'assistant', content: data.message });

                if (data.movie_detail || (data.movie_results && data.movie_results.length > 0) || data.message) {
                    openSplit(text, data);
                }

            } catch (e) {
                console.error(e);
            } finally {
                document.getElementById('searchSend').disabled = false;
                $searchInput.focus();
            }
        }

        /* ── Split View ── */
        function openSplit(userText, data) {
            $splitOverlay.classList.add('visible');
            document.body.style.overflow = 'hidden';

            $splitChat.innerHTML = '';
            addSplitMsg(userText, 'user');
            if (data.message) addSplitMsg(data.message, 'assistant');

            // Store for similar-movie navigation
            lastMovieResults = data.movie_results || [];

            if (data.movie_detail) {
                renderSplitDetail(data.movie_detail, lastMovieResults);
            } else if (lastMovieResults.length > 0) {
                showBestMatch(userText, lastMovieResults);
            } else {
                $splitContent.innerHTML = '<div class="loading-state">No results to show yet</div>';
                $splitTitle.textContent = 'Chat';
            }

            $splitInput.focus();
        }

        function closeSplit() {
            // Stop any playing iframes (trailers)
            const iframes = $splitContent.querySelectorAll('iframe');
            iframes.forEach(iframe => { iframe.src = ''; });
            $splitOverlay.classList.remove('visible');
            document.body.style.overflow = '';
            chatHistory = [];
        }

        function addSplitMsg(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            $splitChat.appendChild(div);
            $splitChat.scrollTop = $splitChat.scrollHeight;
        }

        function showSplitTyping() {
            const div = document.createElement('div');
            div.className = 'msg assistant typing';
            div.id = 'splitTyping';
            div.innerHTML = 'Thinking<span class="dots"><span></span><span></span><span></span></span>';
            $splitChat.appendChild(div);
            $splitChat.scrollTop = $splitChat.scrollHeight;
        }

        function removeSplitTyping() {
            const el = document.getElementById('splitTyping');
            if (el) el.remove();
        }

        async function sendSplitMessage() {
            const text = $splitInput.value.trim();
            if (!text || !API_URL) return;

            $splitInput.value = '';
            addSplitMsg(text, 'user');
            chatHistory.push({ role: 'user', content: text });
            showSplitTyping();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(API_KEY && { 'X-Api-Key': API_KEY })
                    },
                    body: JSON.stringify({ message: text, history: chatHistory.slice(-10) })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                removeSplitTyping();

                if (data.message) {
                    addSplitMsg(data.message, 'assistant');
                    chatHistory.push({ role: 'assistant', content: data.message });
                }

                if (data.movie_results) lastMovieResults = data.movie_results;

                if (data.movie_detail) {
                    renderSplitDetail(data.movie_detail, data.movie_results || []);
                } else if (data.movie_results && data.movie_results.length > 0) {
                    showBestMatch(text, data.movie_results);
                }

            } catch (e) {
                removeSplitTyping();
                addSplitMsg('Something went wrong. Try again.', 'assistant');
            }
        }

        function showBestMatch(query, movies) {
            const q = query.toLowerCase().trim();
            // Find exact title match first
            let best = movies.find(m => m.title && m.title.toLowerCase() === q);
            // Fallback: find title that starts with query
            if (!best) best = movies.find(m => m.title && m.title.toLowerCase().startsWith(q));
            // Fallback: highest-rated
            if (!best) best = movies.reduce((a, b) => (parseFloat(b.rating) || 0) > (parseFloat(a.rating) || 0) ? b : a, movies[0]);
            const similar = movies.filter(m => m.id !== best.id).sort((a, b) => (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
            renderSplitDetail(best, similar);
        }

        function renderSplitDetail(movie, similarMovies) {
            $splitTitle.textContent = movie.title || 'Movie Detail';
            const poster = movie.poster_filename ? `/api/poster/${movie.poster_filename}` : '';
            const genres = Array.isArray(movie.genres) ? movie.genres : [];
            const desc = movie.description || '';
            const similar = similarMovies || [];

            let similarHtml = '';
            if (similar.length > 0) {
                similarHtml = `
                    <div class="similar-section">
                        <div class="similar-title">Similar Movies</div>
                        <div class="similar-row">
                            ${similar.map(m => {
                    const sp = m.poster_filename ? `/api/poster/${m.poster_filename}` : '';
                    const sg = Array.isArray(m.genres) ? m.genres.join(', ') : '';
                    return `
                                    <div class="movie-card" onclick="showMovieInSplit(${m.id}, '${(m.poster_filename || '').replace(/'/g, "\\'")}',' ${(m.title || '').replace(/'/g, "\\'")}',' ${m.rating}', '${m.year}', '${(m.director || '').replace(/'/g, "\\'")}',' ${sg.replace(/'/g, "\\'")}',' ${(m.description || '').replace(/'/g, "\\'")}')">
                                        ${sp ? `<img src="${sp}" alt="${m.title}" loading="lazy">` : '<div style="height:200px;background:var(--card);"></div>'}
                                        <div class="card-body">
                                            <div class="card-title">${m.title}</div>
                                            <span class="card-rating">${m.rating}/10</span>
                                            <div class="card-meta">${m.year}${sg ? ' · ' + sg : ''}</div>
                                        </div>
                                    </div>`;
                }).join('')}
                        </div>
                    </div>`;
            }

            $splitContent.innerHTML = `
                <div class="detail-card">
                    <div class="detail-hero">
                        ${poster ? `<img src="${poster}" alt="${movie.title}" class="detail-poster">` : ''}
                        <div class="detail-info">
                            <h2>${movie.title}</h2>
                            <div class="detail-meta">
                                <span class="tag rating">${movie.rating}/10</span>
                                <span class="tag">${movie.year || ''}</span>
                                ${movie.director ? `<span class="tag">${movie.director}</span>` : ''}
                            </div>
                            ${genres.length ? `<div class="detail-genres">${genres.map(g => `<span>${g}</span>`).join('')}</div>` : ''}
                            ${desc ? `<p class="detail-desc">${desc}</p>` : ''}
                        </div>
                    </div>
                    <div class="detail-trailer" id="inlineTrailer">
                        <div class="trailer-placeholder">
                            <div class="spinner" style="border-top-color:#c33;"></div>
                            Loading trailer…
                        </div>
                    </div>
                    ${similarHtml}
                </div>`;

            if (movie.id) loadInlineTrailer(movie.id, movie.title, movie.year);
        }

        // Store last known movies for re-rendering from similar clicks
        let lastMovieResults = [];

        function showMovieInSplit(id, posterFn, title, rating, year, director, genres, desc) {
            // Stop current trailer
            const iframes = $splitContent.querySelectorAll('iframe');
            iframes.forEach(f => { f.src = ''; });
            const movie = {
                id: id,
                poster_filename: posterFn.trim(),
                title: title.trim(),
                rating: rating.trim(),
                year: year.trim(),
                director: director.trim(),
                genres: genres.trim() ? genres.trim().split(', ') : [],
                description: desc.trim()
            };
            const similar = lastMovieResults.filter(m => m.id !== id)
                .sort((a, b) => (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
            renderSplitDetail(movie, similar);
        }

        async function loadInlineTrailer(movieId, title, year) {
            const container = document.getElementById('inlineTrailer');
            if (!container) return;
            try {
                const res = await fetch(`/api/youtube/trailer/${movieId}`);
                if (!res.ok) throw new Error('No trailer');
                const data = await res.json();
                if (!data.video_id) throw new Error('No video');
                container.innerHTML = `
                    <div style="aspect-ratio:16/9;background:#000;">
                        <iframe src="https://www.youtube.com/embed/${data.video_id}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1"
                            style="width:100%;height:100%;border:none;"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen></iframe>
                    </div>
                    <div style="padding:0.6rem 1rem;border-top:1px solid var(--border);">
                        <div style="color:var(--text);font-size:0.85rem;font-weight:600;">${data.title || 'Official Trailer'}</div>
                        <div style="color:var(--text-muted);font-size:0.75rem;">${title} (${year || ''})</div>
                    </div>`;
            } catch (e) {
                container.innerHTML = `
                    <div style="aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.85rem;background:rgba(0,0,0,0.3);">
                        Trailer not available
                    </div>`;
            }
        }

        function renderSplitGrid(movies) {
            $splitTitle.textContent = 'Recommendations';
            $splitContent.innerHTML = `<div class="ai-grid">
                ${movies.map(m => {
                const poster = m.poster_filename ? `/api/poster/${m.poster_filename}` : '';
                const genres = Array.isArray(m.genres) ? m.genres.join(', ') : '';
                return `
                    <div class="movie-card" onclick="showMovieInSplit(${m.id}, '${(m.poster_filename || '').replace(/'/g, "\\'")}',' ${(m.title || '').replace(/'/g, "\\'")}',' ${m.rating}', '${m.year}', '${(m.director || '').replace(/'/g, "\\'")}',' ${(genres || '').replace(/'/g, "\\'")}',' ${(m.description || '').replace(/'/g, "\\'")}')">
                        ${poster ? `<img src="${poster}" alt="${m.title}" loading="lazy">` : '<div style="height:255px;background:var(--card);"></div>'}
                        <div class="card-body">
                            <div class="card-title">${m.title}</div>
                            <span class="card-rating">${m.rating}/10</span>
                            <div class="card-meta">${m.year}${genres ? ' · ' + genres : ''}</div>
                        </div>
                    </div>`;
            }).join('')}
            </div>`;
        }

        window.scrollTo(0, 0);
        loadMovies(1);
        $searchInput.focus();
    </script>

</body>

</html>
